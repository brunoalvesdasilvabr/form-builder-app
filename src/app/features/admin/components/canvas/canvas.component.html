<form #canvasFormRef appFormLayoutName class="canvas-form canvas-wrapper">
  <div class="canvas-toolbar">
    <div class="canvas-toolbar-row">
      <div class="canvas-toolbar-left">
        <label for="layoutSelect" class="canvas-toolbar-label">Layout:</label>
        <select
          id="layoutSelect"
          name="layoutSelect"
          class="canvas-toolbar-select"
          [ngModel]="selectedLayoutId()"
          (ngModelChange)="onLayoutSelect($event)"
          [ngModelOptions]="{ standalone: true }"
          title="Switch layout"
        >
          <option [ngValue]="null">— New layout —</option>
          @for (layout of layouts(); track layout.id) {
            <option [ngValue]="layout.id">{{ layout.name }}</option>
          }
        </select>
      </div>
      <div class="canvas-toolbar-right">
        <button mat-stroked-button (click)="undo()" [disabled]="!canUndo()" title="Undo last change">Undo</button>
        <button mat-raised-button color="primary" (click)="saveLayout()" [disabled]="!canUndo()" title="Save">
          Save
        </button>
        <button type="button" class="btn btn-secondary" (click)="saveLayout()" title="Preview canvas HTML">
          Clone
        </button>

        <button type="button" class="btn btn-secondary" (click)="downloadCanvasHtml()" title="Download canvas HTML">
          Download
        </button>
        <button type="button" class="btn btn-secondary" (click)="downloadCanvasHtml()" title="Download canvas HTML">
          Upload
        </button>
        <button type="button" class="btn btn-secondary" (click)="openPreview()" title="Preview canvas HTML">
          Preview
        </button>

        <button
          type="button"
          class="btn btn-secondary"
          (click)="publish()"
          title="Publish: strip component tags and log HTML"
        >
          Publish
        </button>
      </div>
    </div>
  </div>
  <div class="canvas-content">
    <div class="canvas-table-toolbar">
      @if (canMerge()) {
        <button type="button" class="btn btn-secondary" (click)="mergeSelection()">Merge selected</button>
      }
    </div>
    <table
      class="canvas-table"
      (dragleave)="onTableDragLeave($event)"
    >
      <tbody>
        @for (row of rows(); track row.id; let rowIdx = $index) {
          <tr
            [class.layout-drop-row-before]="
              layoutDropPreview()?.type === 'row' &&
              layoutDropPreview()?.rowIndex === (row.cells[0]?.rowIndex ?? rowIdx) &&
              layoutDropPreview()?.position === 'before'
            "
            [class.layout-drop-row-after]="
              layoutDropPreview()?.type === 'row' &&
              layoutDropPreview()?.rowIndex === (row.cells[0]?.rowIndex ?? rowIdx) &&
              layoutDropPreview()?.position === 'after'
            "
          >
            @for (cell of row.cells; track cell.id) {
              @if (shouldSkipCell(cell.rowIndex, cell.colIndex)) {
                <!-- slot is part of a merged cell, origin td has the colspan/rowspan -->
              } @else {
                <td
                  [class]="
                    'canvas-cell' +
                    (cell.className ? ' ' + cell.className : '') +
                    (isSelected(cell.rowIndex, cell.colIndex) ? ' canvas-cell-selected' : '') +
                    (layoutDropPreview()?.type === 'col' &&
                    layoutDropPreview()?.colIndex === cell.colIndex &&
                    layoutDropPreview()?.position === 'before'
                      ? ' layout-drop-col-before'
                      : '') +
                    (layoutDropPreview()?.type === 'col' &&
                    layoutDropPreview()?.colIndex === cell.colIndex &&
                    layoutDropPreview()?.position === 'after'
                      ? ' layout-drop-col-after'
                      : '')
                  "
                  [attr.colspan]="
                    getSpan(cell.rowIndex, cell.colIndex).colSpan > 1
                      ? getSpan(cell.rowIndex, cell.colIndex).colSpan
                      : null
                  "
                  [attr.rowspan]="
                    getSpan(cell.rowIndex, cell.colIndex).rowSpan > 1
                      ? getSpan(cell.rowIndex, cell.colIndex).rowSpan
                      : null
                  "
                  (click)="onCellClick($event, cell.rowIndex, cell.colIndex, cell)"
                  (drop)="onDrop($event, cell)"
                  (dragover)="onDragOver($event, cell)"
                  (dragleave)="onDragLeave($event)"
                >
                  @if (cell.widget) {
                    <app-widget-renderer
                      [widget]="cell.widget"
                      [cellId]="cell.id"
                      (removeWidget)="removeWidget(cell.id)"
                      (nestedTableChange)="updateNestedTable(cell.id, cell.widget.id, $event)"
                      (labelChange)="updateWidgetLabel(cell.id, cell.widget.id, $event)"
                      (optionsChange)="updateWidgetOptions(cell.id, cell.widget.id, $event)"
                      (optionSelect)="onRadioOptionSelect(cell.id, $event)"
                    />
                  } @else {
                    <div class="canvas-cell-placeholder">Drop component</div>
                  }
                </td>
              }
            }
          </tr>
        }
      </tbody>
    </table>
  </div>
</form>
