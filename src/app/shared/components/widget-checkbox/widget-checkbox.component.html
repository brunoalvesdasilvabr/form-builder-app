@if (widget(); as w) {
  <div class="widget-checkbox-wrapper">
    <input
      type="checkbox"
      [attr.name]="w.formControlName || w.id"
      class="widget-checkbox-control"
      data-class-target="checkbox"
      [ngClass]="getElementClassObj('checkbox')"
      [id]="w.id"
      [attr.data-form-control-name]="w.formControlName ?? null"
      [attr.data-property-binding]="getPropertyBinding(w.valueBinding) ?? null"
      [attr.data-error-condition]="w.errorCondition ?? null"
    />
    <input
    type="text"
    class="widget-checkbox-label"
    data-class-target="label"
    [ngClass]="getElementClassObj('label')"
    [value]="w.label ?? ''"
    (input)="onLabelInput($any($event.target).value)"
    placeholder="Checkbox label"
  />
    @if (w.errorMessage) {
      <span
        class="widget-error-message"
        [attr.data-error-condition]="w.errorCondition ?? null"
        [attr.data-error-message]="w.errorMessage"
      >{{ w.errorMessage }}</span>
    }
  </div>
}
