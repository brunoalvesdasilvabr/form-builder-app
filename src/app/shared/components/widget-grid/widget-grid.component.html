@if (widget(); as w) {
  <div class="widget-grid-wrap" [ngClass]="getElementClassObj('table')">
    <table mat-table [dataSource]="dataSource" class="widget-grid-table">
      @for (col of columns(); track col.id) {
        <ng-container [matColumnDef]="col.columnName">
          <th mat-header-cell *matHeaderCellDef>{{ col.headerName }}</th>
          <td mat-cell *matCellDef="let row">{{ row[col.columnName] ?? row['placeholder'] ?? '—' }}</td>
        </ng-container>
      }
      <tr mat-header-row *matHeaderRowDef="displayedColumns()"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns()"></tr>
    </table>
  </div>
}
