@if (widget(); as w) {
  <label
    #editableRef
    class="widget-label-control"
    [attr.data-form-control-name]="w.formControlName ?? null"
    [attr.data-property-binding]="getPropertyBinding(w.valueBinding) ?? null"
    [attr.data-visibility-condition]="w.visibilityCondition ?? null"
    [ngClass]="getElementClassObj('control')"
    contenteditable="true"
    (input)="onLabelInput($event)"
    (blur)="onLabelBlur($event)"
  ></label>
}
