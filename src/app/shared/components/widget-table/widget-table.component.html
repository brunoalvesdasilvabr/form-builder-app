@if (widget(); as w) {
  <div
    class="widget-table-wrap"
    [ngClass]="getElementClassObj('table')"
    [attr.data-visibility-condition]="w.visibilityCondition ?? null"
  >
    <app-embedded-table
      [widget]="w"
      [parentCellId]="parentCellId()"
      [parentWidgetId]="w.id"
      (nestedTableChange)="nestedTableChange.emit($event)"
    />
  </div>
}
