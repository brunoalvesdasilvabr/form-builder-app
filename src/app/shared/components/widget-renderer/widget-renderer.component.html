@if (widget(); as w) {
  @switch (w.type) {
      @case ('input') {
        <app-widget-input [widget]="w" />
      }
      @case ('checkbox') {
        <app-widget-checkbox
          [widget]="w"
          (labelChange)="labelChange.emit($event)"
        />
      }
      @case ('radio') {
        <app-widget-radio
          [widget]="w"
          (labelChange)="labelChange.emit($event)"
          (optionsChange)="optionsChange.emit($event)"
          (optionSelect)="optionSelect.emit($event)"
        />
      }
      @case ('table') {
        <app-widget-table
          [widget]="w"
          [parentCellId]="cellId()"
          (nestedTableChange)="nestedTableChange.emit($event)"
        />
      }
      @case ('grid') {
        <app-widget-grid [widget]="w" [selectedColumnIndex]="selectedGridColumnIndex()" />
      }
      @case ('label') {
        <app-widget-label
          [widget]="w"
          (labelChange)="labelChange.emit($event)"
        />
      }
      @case ('panel') {
        <app-widget-panel [widget]="w" />
      }
    }
  @if (showRemove()) {
    <button type="button" class="widget-remove" (click)="onRemove($event)" title="Remove">×</button>
  }
}
